stages:
  - lint
  - test
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: always

default:
  image: rust:nightly
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    CARGO_TERM_COLOR: always
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/bin
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target
  before_script:
    - if command -v rustc >/dev/null 2>&1; then rustc --version; fi
    - if command -v cargo >/dev/null 2>&1; then cargo --version; fi
    - if command -v rustup >/dev/null 2>&1; then rustup component add rustfmt clippy; fi

cargo_fmt:
  stage: lint
  script:
    - cargo fmt --all -- --check

cargo_check:
  stage: lint
  script:
    - cargo check --all-targets --all-features --locked

cargo_clippy:
  stage: lint
  script:
    - cargo clippy --all-targets --all-features --locked -- -D warnings

cargo_test:
  stage: test
  script:
    - cargo test --locked

cargo_test_extended:
  stage: test
  script:
    - cargo test --all-targets --all-features --release --locked

release:
  stage: release
  script:
    - apt-get update && apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross && rm -rf /var/lib/apt/lists/*
    - rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
    - RELEASE_TAG="${GIT_COMMIT_TAG:-${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}}"
    - export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
    - cargo build --release --locked --target x86_64-unknown-linux-gnu
    - cargo build --release --locked --target aarch64-unknown-linux-gnu
    - mkdir -p "dist/leaf-amd64-linux-${RELEASE_TAG}" "dist/leaf-arm64-linux-${RELEASE_TAG}"
    - cp target/x86_64-unknown-linux-gnu/release/leaf "dist/leaf-amd64-linux-${RELEASE_TAG}/leaf"
    - cp target/aarch64-unknown-linux-gnu/release/leaf "dist/leaf-arm64-linux-${RELEASE_TAG}/leaf"
    - cp README.md LICENSE "dist/leaf-amd64-linux-${RELEASE_TAG}/"
    - cp README.md LICENSE "dist/leaf-arm64-linux-${RELEASE_TAG}/"
    - tar -C dist -czf "dist/leaf-amd64-linux-${RELEASE_TAG}.tar.gz" "leaf-amd64-linux-${RELEASE_TAG}"
    - tar -C dist -czf "dist/leaf-arm64-linux-${RELEASE_TAG}.tar.gz" "leaf-arm64-linux-${RELEASE_TAG}"
    - sha256sum dist/*.tar.gz > dist/SHA256SUMS
  artifacts:
    name: "leaf-${CI_COMMIT_TAG}"
    paths:
      - dist/*.tar.gz
      - dist/SHA256SUMS
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG

container_release:
  stage: release
  image:
    name: quay.io/buildah/stable:v1.39.3
    entrypoint: [""]
  before_script: []
  variables:
    QUAY_REGISTRY: "quay.io"
    QUAY_ORG: "cloudflavor"
    QUAY_REPOSITORY: "leaf"
    TARGET_ARCHES: "amd64 arm64"
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot
  script:
    - test -n "$QUAY_USERNAME"
    - test -n "$QUAY_PASSWORD"
    - RELEASE_TAG="${GIT_COMMIT_TAG:-${CI_COMMIT_TAG:-}}"
    - test -n "$RELEASE_TAG"
    - QUAY_REGISTRY="${QUAY_REGISTRY:-quay.io}"
    - QUAY_ORG="${QUAY_ORG:-cloudflavor}"
    - QUAY_REPOSITORY="${QUAY_REPOSITORY:-leaf}"
    - IMAGE_REF="$QUAY_REGISTRY/$QUAY_ORG/$QUAY_REPOSITORY"
    - MANIFEST_NAME="leaf-manifest-${RELEASE_TAG}"
    - printf "%s" "$QUAY_PASSWORD" | buildah login --username "$QUAY_USERNAME" --password-stdin "$QUAY_REGISTRY"
    - buildah manifest rm "$MANIFEST_NAME" >/dev/null 2>&1 || true
    - buildah manifest create "$MANIFEST_NAME"
    - |
      for arch in $TARGET_ARCHES; do
        buildah bud --pull --arch "$arch" --manifest "$MANIFEST_NAME" -f Containerfile .
      done
    - buildah manifest push --all "$MANIFEST_NAME" "docker://$IMAGE_REF:$RELEASE_TAG"
    - buildah manifest push --all "$MANIFEST_NAME" "docker://$IMAGE_REF:latest"
    - buildah manifest rm "$MANIFEST_NAME"
  rules:
    - if: $CI_COMMIT_TAG || $GIT_COMMIT_TAG
