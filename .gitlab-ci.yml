stages:
  - lint
  - test
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: always

default:
  image: rust:nightly
  variables:
    CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
    CARGO_TERM_COLOR: always
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/bin
      - .cargo/registry/index
      - .cargo/registry/cache
      - .cargo/git/db
      - target
  before_script:
    - if command -v rustc >/dev/null 2>&1; then rustc --version; fi
    - if command -v cargo >/dev/null 2>&1; then cargo --version; fi
    - if command -v rustup >/dev/null 2>&1; then rustup component add rustfmt clippy; fi

cargo_fmt:
  stage: lint
  script:
    - cargo fmt --all -- --check

cargo_check:
  stage: lint
  script:
    - cargo check --all-targets --all-features --locked

cargo_clippy:
  stage: lint
  script:
    - cargo clippy --all-targets --all-features --locked -- -D warnings

cargo_test:
  stage: test
  script:
    - cargo test --locked

cargo_test_extended:
  stage: test
  script:
    - cargo test --all-targets --all-features --release --locked

release:
  stage: release
  script:
    - cargo build --release --locked
    - mkdir -p dist
    - cp target/release/leaf dist/leaf
  artifacts:
    name: "leaf-${CI_COMMIT_TAG}"
    paths:
      - dist/leaf
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG

container_release:
  stage: release
  image:
    name: quay.io/buildah/stable:v1.39.3
    entrypoint: [""]
  before_script: []
  variables:
    QUAY_REGISTRY: "quay.io"
    QUAY_ORG: "cloudflavor"
    QUAY_REPOSITORY: "leaf"
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot
  script:
    - test -n "$QUAY_USERNAME"
    - test -n "$QUAY_PASSWORD"
    - RELEASE_TAG="${GIT_COMMIT_TAG:-${CI_COMMIT_TAG:-}}"
    - test -n "$RELEASE_TAG"
    - QUAY_REGISTRY="${QUAY_REGISTRY:-quay.io}"
    - QUAY_ORG="${QUAY_ORG:-cloudflavor}"
    - QUAY_REPOSITORY="${QUAY_REPOSITORY:-leaf}"
    - IMAGE_REF="$QUAY_REGISTRY/$QUAY_ORG/$QUAY_REPOSITORY"
    - printf "%s" "$QUAY_PASSWORD" | buildah login --username "$QUAY_USERNAME" --password-stdin "$QUAY_REGISTRY"
    - buildah bud --pull -f Containerfile -t "$IMAGE_REF:$RELEASE_TAG" -t "$IMAGE_REF:latest" .
    - buildah push "$IMAGE_REF:$RELEASE_TAG"
    - buildah push "$IMAGE_REF:latest"
  rules:
    - if: $CI_COMMIT_TAG || $GIT_COMMIT_TAG
